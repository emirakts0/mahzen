info:
  name: Delete entry
  type: http
  seq: 5
  tags:
    - Entries

http:
  method: DELETE
  url: "{{baseUrl}}/v1/entries/:entry_id"
  params:
    - name: entry_id
      value: ""
      type: path
      description: Entry ID
  auth:
    type: bearer
    token: "{{authToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Entry deleted successfully
    request:
      url: "{{baseUrl}}/v1/entries/:entry_id"
      method: DELETE
      params:
        - name: entry_id
          value: ""
          type: path
          description: Entry ID
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v1/entries/:entry_id"
      method: DELETE
      params:
        - name: entry_id
          value: ""
          type: path
          description: Entry ID
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
  - name: 500 Response
    description: Server error
    request:
      url: "{{baseUrl}}/v1/entries/:entry_id"
      method: DELETE
      params:
        - name: entry_id
          value: ""
          type: path
          description: Entry ID
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
