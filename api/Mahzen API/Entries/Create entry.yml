info:
  name: Create entry
  type: http
  seq: 2
  tags:
    - Entries

http:
  method: POST
  url: "{{baseUrl}}/v1/entries"
  body:
    type: json
    data: |-
      {
        "title": "My New Note",
        "content": "Content of the note",
        "path": "/notes/personal",
        "visibility": "public",
        "tag_ids": [],
        "file_type": "text/markdown"
      }
  auth:
    type: bearer
    token: "{{authToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Entry created successfully
    request:
      url: "{{baseUrl}}/v1/entries"
      method: POST
      body:
        type: json
        data: |-
          {
            "title": "My New Note",
            "content": "Content of the note",
            "path": "/notes/personal",
            "visibility": "public",
            "tag_ids": [],
            "file_type": "text/markdown"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "entry": {
              "id": "",
              "user_id": "",
              "title": "My Notes",
              "content": "This is the content of my note.",
              "summary": "",
              "path": "/notes/work",
              "visibility": "public",
              "tags": [
                "go",
                "backend",
                "api"
              ],
              "file_type": "text/markdown",
              "file_size": 0,
              "created_at": "",
              "updated_at": ""
            }
          }
  - name: 400 Response
    description: Invalid request
    request:
      url: "{{baseUrl}}/v1/entries"
      method: POST
      body:
        type: json
        data: |-
          {
            "title": "My New Note",
            "content": "Content of the note",
            "path": "/notes/personal",
            "visibility": "public",
