info:
  name: Semantic search
  type: http
  seq: 2
  tags:
    - Search

http:
  method: GET
  url: "{{baseUrl}}/v1/search/semantic"
  params:
    - name: query
      value: ""
      type: query
      description: Natural language search query
      disabled: true
    - name: tags
      value: ""
      type: query
      description: Filter by tags (comma-separated)
      disabled: true
    - name: path
      value: ""
      type: query
      description: Filter by exact path
      disabled: true
    - name: from_date
      value: ""
      type: query
      description: Filter entries created on or after this date
      disabled: true
    - name: to_date
      value: ""
      type: query
      description: Filter entries created on or before this date
      disabled: true
    - name: only_mine
      value: "false"
      type: query
      description: Only search entries owned by current user
    - name: visibility
      value: public
      type: query
      description: Filter by visibility
      disabled: true
    - name: visibility
      value: private
      type: query
      description: Filter by visibility
      disabled: true
    - name: limit
      value: "20"
      type: query
      description: Maximum number of results
    - name: offset
      value: "0"
      type: query
      description: Number of results to skip
  auth:
    type: bearer
    token: "{{authToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

