services:
  postgres:
    image: postgres:18.3-alpine
    container_name: mahzen-postgres
    environment:
      POSTGRES_USER: mahzen
      POSTGRES_PASSWORD: mahzen
      POSTGRES_DB: mahzen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mahzen -d mahzen"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  typesense:
    image: typesense/typesense:30.1
    container_name: mahzen-typesense
    environment:
      TYPESENSE_API_KEY: mahzen-typesense-key
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_ENABLE_CORS: "true"
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8108"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    container_name: mahzen-rustfs
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ADDRESS: ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  typesense_data:
  rustfs_data:
