info:
  name: Get tag
  type: http
  seq: 5
  tags:
    - Tags

http:
  method: GET
  url: "{{baseUrl}}/v1/tags/:id"
  params:
    - name: id
      value: ""
      type: path
      description: Tag ID
  auth:
    type: bearer
    token: "{{authToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Tag details
    request:
      url: "{{baseUrl}}/v1/tags/:id"
      method: GET
      params:
        - name: id
          value: ""
          type: path
          description: Tag ID
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "tag": {
              "id": "",
              "name": "golang",
              "slug": "golang",
              "created_at": ""
            }
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v1/tags/:id"
      method: GET
      params:
        - name: id
          value: ""
          type: path
          description: Tag ID
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
  - name: 404 Response
    description: Tag not found
    request:
      url: "{{baseUrl}}/v1/tags/:id"
      method: GET
      params:
        - name: id
          value: ""
          type: path
          description: Tag ID
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
