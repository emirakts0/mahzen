info:
  name: Get current user
  type: http
  seq: 1
  tags:
    - Users

http:
  method: GET
  url: "{{baseUrl}}/v1/users/me"
  auth:
    type: bearer
    token: "{{authToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: User profile
    request:
      url: "{{baseUrl}}/v1/users/me"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "user": {
              "id": "",
              "email": "",
              "display_name": ""
            }
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v1/users/me"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
  - name: 404 Response
    description: User not found
    request:
      url: "{{baseUrl}}/v1/users/me"
      method: GET
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
