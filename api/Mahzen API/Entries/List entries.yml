info:
  name: List entries
  type: http
  seq: 1
  tags:
    - Entries

http:
  method: GET
  url: "{{baseUrl}}/v1/entries"
  params:
    - name: path
      value: ""
      type: query
      description: "Path to list entries from (default: /)"
      disabled: true
    - name: own
      value: "false"
      type: query
      description: Only show entries owned by the current user
    - name: visibility
      value: public
      type: query
      description: Filter by visibility
      disabled: true
    - name: visibility
      value: private
      type: query
      description: Filter by visibility
      disabled: true
    - name: tags
      value: ""
      type: query
      description: Filter by tags (comma-separated)
      disabled: true
    - name: from_date
      value: ""
      type: query
      description: Filter entries created on or after this date (YYYY-MM-DD)
      disabled: true
    - name: to_date
      value: ""
      type: query
      description: Filter entries created on or before this date (YYYY-MM-DD)
      disabled: true
    - name: limit
      value: "20"
      type: query
      description: Maximum number of entries to return
    - name: offset
      value: "0"
      type: query
      description: Number of entries to skip
  auth:
    type: bearer
    token: "{{authToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

