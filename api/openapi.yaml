openapi: 3.1.0
info:
  title: Mahzen API
  description: |
    Mahzen is a knowledge management system with hierarchical entries,
    semantic search, and AI-powered summarization.

    ## Authentication
    All endpoints except `/health` and `/v1/auth/*` require a Bearer token
    in the Authorization header.
  version: 1.0.0
  contact:
    name: Mahzen

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Health
    description: System health check endpoints
  - name: Auth
    description: Authentication and authorization
  - name: Entries
    description: Entry management operations
  - name: Tags
    description: Tag management operations
  - name: Search
    description: Keyword and semantic search
  - name: Users
    description: User profile operations

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /v1/auth/login or /v1/auth/register

  schemas:
    # Common schemas
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message

    Empty:
      type: object
      description: Empty response object

    # Auth schemas
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        display_name:
          type: string
          example: John Doe
        password:
          type: string
          format: password
          minLength: 8
          example: securepassword123

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: securepassword123

    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: JWT refresh token

    LogoutRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: JWT refresh token to invalidate

    AuthResponse:
      type: object
      required:
        - access_token
        - refresh_token
      properties:
        access_token:
          type: string
          description: JWT access token (short-lived)
        refresh_token:
          type: string
          description: JWT refresh token (long-lived)

    # User schemas
    User:
      type: object
      required:
        - id
        - email
        - display_name
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string

    UserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: '#/components/schemas/User'

    # Entry schemas
    Visibility:
      type: string
      enum:
        - public
        - private
      description: |
        Entry visibility:
        - `public`: Visible to all authenticated users
        - `private`: Visible only to the owner

    Entry:
      type: object
      required:
        - id
        - user_id
        - title
        - content
        - path
        - visibility
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        title:
          type: string
          example: My Notes
        content:
          type: string
          example: This is the content of my note.
        summary:
          type: string
          description: AI-generated summary (optional)
        path:
          type: string
          description: Hierarchical path (e.g., /notes/work)
          example: /notes/work
        visibility:
          $ref: '#/components/schemas/Visibility'
        tags:
          type: array
          items:
            type: string
          example: [go, backend, api]
        file_type:
          type: string
          description: MIME type or file extension
          example: text/markdown
        file_size:
          type: integer
          format: int64
          description: Size in bytes
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EntryResponse:
      type: object
      required:
        - entry
      properties:
        entry:
          $ref: '#/components/schemas/Entry'

    CreateEntryRequest:
      type: object
      properties:
        title:
          type: string
          example: My New Note
        content:
          type: string
          example: Content of the note
        path:
          type: string
          example: /notes/personal
        visibility:
          $ref: '#/components/schemas/Visibility'
        tag_ids:
          type: array
          items:
            type: string
            format: uuid
          description: List of tag IDs to attach
        file_type:
          type: string
          example: text/markdown

    UpdateEntryRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        path:
          type: string
        visibility:
          $ref: '#/components/schemas/Visibility'
        tag_ids:
          type: array
          items:
            type: string
            format: uuid
          description: List of tag IDs (replaces existing)
        file_type:
          type: string

    Folder:
      type: object
      required:
        - path
        - count
      properties:
        path:
          type: string
          description: Folder path
          example: /notes/work
        count:
          type: integer
          description: Number of entries in this folder

    EntryListResponse:
      type: object
      required:
        - entries
        - folders
        - total
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/Entry'
        folders:
          type: array
          items:
            $ref: '#/components/schemas/Folder'
        total:
          type: integer
          description: Total number of entries matching the query

    # Tag schemas
    Tag:
      type: object
      required:
        - id
        - name
        - slug
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: golang
        slug:
          type: string
          example: golang
        created_at:
          type: string
          format: date-time

    TagResponse:
      type: object
      required:
        - tag
      properties:
        tag:
          $ref: '#/components/schemas/Tag'

    CreateTagRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: rust

    TagListResponse:
      type: object
      required:
        - tags
        - total
      properties:
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        total:
          type: integer

    AttachTagRequest:
      type: object
      required:
        - tag_id
      properties:
        tag_id:
          type: string
          format: uuid
          description: ID of the tag to attach

    # Search schemas
    Highlight:
      type: object
      required:
        - field
        - snippet
      properties:
        field:
          type: string
          description: Field name where highlight was found
          example: content
        snippet:
          type: string
          description: Text snippet with highlight markers
          example: This is a <mark>matching</mark> text

    SearchResult:
      type: object
      required:
        - entry_id
        - title
        - path
        - visibility
        - created_at
      properties:
        entry_id:
          type: string
          format: uuid
        title:
          type: string
        summary:
          type: string
          description: AI-generated summary
        content:
          type: string
          description: Full content (optional)
        score:
          type: number
          format: double
          description: Relevance score (semantic search only)
        highlights:
          type: array
          items:
            $ref: '#/components/schemas/Highlight'
          description: Keyword match highlights (keyword search only)
        path:
          type: string
        visibility:
          $ref: '#/components/schemas/Visibility'
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        file_type:
          type: string
        file_size:
          type: integer
          format: int64

    SearchResponse:
      type: object
      required:
        - results
        - total
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
        total:
          type: integer
          description: Total number of results

    # Health schemas
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy, unknown]
        latency:
          type: string
          example: 1.234ms
        count:
          type: integer
          description: Entry/document count
        error:
          type: string
          description: Error message if unhealthy

    HealthResponse:
      type: object
      required:
        - status
        - database
        - typesense
      properties:
        status:
          type: string
          enum: [ok, degraded]
        database:
          $ref: '#/components/schemas/HealthStatus'
        typesense:
          $ref: '#/components/schemas/HealthStatus'

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of all system components
      operationId: checkHealth
      security: []
      responses:
        '200':
          description: All systems healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: One or more systems unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /v1/auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      description: Creates a new user account and returns authentication tokens
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Registration failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/auth/login:
    post:
      tags:
        - Auth
      summary: Login
      description: Authenticates a user and returns tokens
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      description: Exchange a refresh token for new tokens
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refresh successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/auth/logout:
    post:
      tags:
        - Auth
      summary: Logout
      description: Invalidate the refresh token
      operationId: logout
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Empty'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Logout failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/entries:
    get:
      tags:
        - Entries
      summary: List entries
      description: |
        Lists entries and folders at a given path. Supports pagination and filtering.
      operationId: listEntries
      security:
        - bearerAuth: []
      parameters:
        - name: path
          in: query
          description: "Path to list entries from (default: /)"
          schema:
            type: string
            example: /notes
        - name: own
          in: query
          description: Only show entries owned by the current user
          schema:
            type: boolean
            default: false
        - name: visibility
          in: query
          description: Filter by visibility
          schema:
            $ref: '#/components/schemas/Visibility'
        - name: tags
          in: query
          description: Filter by tags (comma-separated)
          schema:
            type: string
            example: go,backend
        - name: from_date
          in: query
          description: Filter entries created on or after this date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          description: Filter entries created on or before this date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: limit
          in: query
          description: Maximum number of entries to return
          schema:
            type: integer
            default: 20
            minimum: 0
        - name: offset
          in: query
          description: Number of entries to skip
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: List of entries and folders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntryListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Entries
      summary: Create entry
      description: Creates a new entry
      operationId: createEntry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntryRequest'
      responses:
        '200':
          description: Entry created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/entries/{entry_id}:
    get:
      tags:
        - Entries
      summary: Get entry
      description: Retrieves a single entry by ID
      operationId: getEntry
      security:
        - bearerAuth: []
      parameters:
        - name: entry_id
          in: path
          required: true
          description: Entry ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Entry details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntryResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags:
        - Entries
      summary: Update entry
      description: Updates an existing entry
      operationId: updateEntry
      security:
        - bearerAuth: []
      parameters:
        - name: entry_id
          in: path
          required: true
          description: Entry ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEntryRequest'
      responses:
        '200':
          description: Entry updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Entries
      summary: Delete entry
      description: Deletes an entry permanently
      operationId: deleteEntry
      security:
        - bearerAuth: []
      parameters:
        - name: entry_id
          in: path
          required: true
          description: Entry ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Entry deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Empty'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/entries/{entry_id}/tags:
    post:
      tags:
        - Tags
      summary: Attach tag to entry
      description: Attaches an existing tag to an entry
      operationId: attachTag
      security:
        - bearerAuth: []
      parameters:
        - name: entry_id
          in: path
          required: true
          description: Entry ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachTagRequest'
      responses:
        '200':
          description: Tag attached successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Empty'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/entries/{entry_id}/tags/{tag_id}:
    delete:
      tags:
        - Tags
      summary: Detach tag from entry
      description: Removes a tag from an entry
      operationId: detachTag
      security:
        - bearerAuth: []
      parameters:
        - name: entry_id
          in: path
          required: true
          description: Entry ID
          schema:
            type: string
            format: uuid
        - name: tag_id
          in: path
          required: true
          description: Tag ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tag detached successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Empty'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/tags:
    get:
      tags:
        - Tags
      summary: List tags
      description: Lists all tags with pagination
      operationId: listTags
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          description: Maximum number of tags to return
          schema:
            type: integer
            default: 20
            minimum: 1
        - name: offset
          in: query
          description: Number of tags to skip
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: List of tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Tags
      summary: Create tag
      description: Creates a new tag
      operationId: createTag
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagRequest'
      responses:
        '200':
          description: Tag created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/tags/{id}:
    get:
      tags:
        - Tags
      summary: Get tag
      description: Retrieves a single tag by ID
      operationId: getTag
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Tag ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tag details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Tag not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Tags
      summary: Delete tag
      description: Deletes a tag permanently
      operationId: deleteTag
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Tag ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tag deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Empty'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/search/keyword:
    get:
      tags:
        - Search
      summary: Keyword search
      description: |
        Performs a keyword-based search across entries. Returns highlighted
        snippets showing where the search terms were found.
      operationId: keywordSearch
      security:
        - bearerAuth: []
      parameters:
        - name: query
          in: query
          description: Search query string
          schema:
            type: string
        - name: tags
          in: query
          description: Filter by tags (comma-separated)
          schema:
            type: string
            example: go,backend
        - name: path
          in: query
          description: Filter by exact path
          schema:
            type: string
        - name: from_date
          in: query
          description: Filter entries created on or after this date
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          description: Filter entries created on or before this date
          schema:
            type: string
            format: date
        - name: only_mine
          in: query
          description: Only search entries owned by current user
          schema:
            type: boolean
            default: false
        - name: visibility
          in: query
          description: Filter by visibility
          schema:
            $ref: '#/components/schemas/Visibility'
        - name: limit
          in: query
          description: Maximum number of results
          schema:
            type: integer
            default: 20
            minimum: 1
        - name: offset
          in: query
          description: Number of results to skip
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/search/semantic:
    get:
      tags:
        - Search
      summary: Semantic search
      description: |
        Performs a semantic (vector-based) search using AI embeddings.
        Finds conceptually similar content even without exact keyword matches.
      operationId: semanticSearch
      security:
        - bearerAuth: []
      parameters:
        - name: query
          in: query
          description: Natural language search query
          schema:
            type: string
        - name: tags
          in: query
          description: Filter by tags (comma-separated)
          schema:
            type: string
        - name: path
          in: query
          description: Filter by exact path
          schema:
            type: string
        - name: from_date
          in: query
          description: Filter entries created on or after this date
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          description: Filter entries created on or before this date
          schema:
            type: string
            format: date
        - name: only_mine
          in: query
          description: Only search entries owned by current user
          schema:
            type: boolean
            default: false
        - name: visibility
          in: query
          description: Filter by visibility
          schema:
            $ref: '#/components/schemas/Visibility'
        - name: limit
          in: query
          description: Maximum number of results
          schema:
            type: integer
            default: 20
            minimum: 1
        - name: offset
          in: query
          description: Number of results to skip
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Search results with relevance scores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/users/me:
    get:
      tags:
        - Users
      summary: Get current user
      description: Returns the currently authenticated user's profile
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
