services:
  postgres:
    image: postgres:18.3-alpine
    container_name: mahzen-postgres
    environment:
      POSTGRES_USER: mahzen
      POSTGRES_PASSWORD: mahzen
      POSTGRES_DB: mahzen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mahzen -d mahzen"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.41
    container_name: mahzen-meilisearch
    environment:
      MEILI_MASTER_KEY: mahzen-meilisearch-key
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/data.ms
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  meilisearch_data:
