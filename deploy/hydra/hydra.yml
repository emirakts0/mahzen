serve:
  public:
    cors:
      enabled: true
  admin:
    cors:
      enabled: true

urls:
  self:
    issuer: http://localhost:4444/
  consent: http://localhost:3000/consent
  login: http://localhost:3000/login
  logout: http://localhost:3000/logout

secrets:
  system:
    - mahzen-hydra-secret-change-in-production

oidc:
  subject_identifiers:
    supported_types:
      - public
      - pairwise
    pairwise:
      salt: mahzen-hydra-salt-change-in-production

log:
  level: debug
  format: text
