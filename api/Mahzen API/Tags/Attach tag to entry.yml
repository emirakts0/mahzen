info:
  name: Attach tag to entry
  type: http
  seq: 1
  tags:
    - Tags

http:
  method: POST
  url: "{{baseUrl}}/v1/entries/:entry_id/tags"
  params:
    - name: entry_id
      value: ""
      type: path
      description: Entry ID
  body:
    type: json
    data: |-
      {
        "tag_id": ""
      }
  auth:
    type: bearer
    token: "{{authToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Tag attached successfully
    request:
      url: "{{baseUrl}}/v1/entries/:entry_id/tags"
      method: POST
      params:
        - name: entry_id
          value: ""
          type: path
          description: Entry ID
      body:
        type: json
        data: |-
          {
            "tag_id": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 400 Response
